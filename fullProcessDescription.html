<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>平台业务流转全流程说明</title>
  <style>
    img {
      width: 280px;
      height: 280px;
    }

    /* 图片放大模态框样式 */
    .modal {
      display: none;
      position: fixed;
      z-index: 9999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.8);
      justify-content: center;
      align-items: center;
    }

    .modal img {
      width: 100%; /* 全宽 */
      height: 100%; /* 全高 */
      object-fit: contain; /* 保持图片比例，避免拉伸 */
    }

    .close {
      position: absolute;
      top: 20px;
      right: 30px;
      color: white;
      font-size: 30px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>平台业务流转全流程说明</h1>
  <div id="content"></div>

  <!-- 图片放大模态框 -->
  <div id="imageModal" class="modal">
    <span class="close">&times;</span>
    <img id="modalImage" src="" alt="放大图片">
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    // 加载 Markdown 文件并渲染内容
    fetch('./fullProcessDescription.md')
      .then(response => response.text())
      .then(text => {
        document.getElementById('content').innerHTML = marked.parse(text);

        // 为所有图片绑定点击事件
        const images = document.querySelectorAll('#content img');
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImage');
        const closeBtn = document.querySelector('.close');

        images.forEach(img => {
          img.style.cursor = 'pointer'; // 鼠标悬停显示手型
          img.addEventListener('click', () => {
            modalImg.src = img.src; // 设置模态框中的图片源
            modal.style.display = 'flex'; // 显示模态框

            // 新增：为模态框内的图片绑定点击事件，用于关闭模态框
            modalImg.onclick = () => {
              modal.style.display = 'none';
            };
          });
        });

        // 点击关闭按钮或模态框背景关闭模态框
        closeBtn.addEventListener('click', () => {
          modal.style.display = 'none';
        });

        modal.addEventListener('click', (e) => {
          if (e.target === modal) {
            modal.style.display = 'none';
          }
        });
      });
  </script>
</body>
</html>
